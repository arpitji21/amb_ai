services:
  - type: web
    name: leip-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: leip-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: leip-db
    plan: free
